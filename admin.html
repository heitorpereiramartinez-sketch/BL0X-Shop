<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 40px; text-align: center; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 20px; display: inline-block; width: 350px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #7289da; color: white; font-weight: bold; cursor: pointer; }
        .item { background: #222; padding: 15px; margin: 10px auto; width: 350px; border-radius: 12px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <h1>BL0X Admin</h1>
    <div class="box">
        <select id="jogo">
            <option value="gag2">Grow a Garden 2</option>
        </select>
        <input id="nome" placeholder="Nome do Item">
        <input id="preco" placeholder="Preço">
        <input id="foto" placeholder="Link da Imagem">
        <button onclick="salvar()">Adicionar</button>
    </div>
    <div id="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        window.salvar = () => {
            const jogo = document.getElementById('jogo').value;
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;
            const foto = document.getElementById('foto').value;
            push(ref(db, 'produtos/' + jogo + '/'), { nome, preco, foto });
        };

        window.remover = (jogo, id) => { remove(ref(db, 'produtos/' + jogo + '/' + id)); };

        onValue(ref(db, 'produtos/'), (snap) => {
            const data = snap.val();
            const div = document.getElementById('lista');
            div.innerHTML = "";
            for(let jogo in data) {
                for(let id in data[jogo]) {
                    div.innerHTML += `<div class="item">${data[jogo][id].nome} <button onclick="remover('${jogo}', '${id}')" style="width: auto; background:#ff4444">X</button></div>`;
                }
            }
        });
    </script>
</body>
</html>
