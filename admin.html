<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BL0X Admin</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 10px; display: inline-block; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        .item { background: #222; padding: 10px; margin: 10px auto; width: 320px; display: flex; justify-content: space-between; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Painel de Admin</h1>
    <div class="box">
        <select id="jogo">
            <option value="gag2">Grow a Garden 2</option>
        </select>
        <input id="nome" placeholder="Nome do Item">
        <input id="preco" placeholder="Preço">
        <button onclick="salvar()">Adicionar</button>
    </div>

    <h3>Itens Cadastrados:</h3>
    <div id="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        window.salvar = () => {
            const jogo = document.getElementById('jogo').value;
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;
            if(nome && preco) {
                push(ref(db, 'produtos/' + jogo + '/'), { nome, preco });
                alert("Salvo em " + jogo);
            }
        };

        window.remover = (jogo, id) => { remove(ref(db, 'produtos/' + jogo + '/' + id)); };

        onValue(ref(db, 'produtos/'), (snap) => {
            const data = snap.val();
            const div = document.getElementById('lista');
            div.innerHTML = "";
            for(let jogo in data) {
                for(let id in data[jogo]) {
                    div.innerHTML += `<div class="item"><b>[${jogo}]</b> ${data[jogo][id].nome} - R$ ${data[jogo][id].preco} 
                    <button onclick="remover('${jogo}', '${id}')">Excluir</button></div>`;
                }
            }
        });
    </script>
</body>
</html>
