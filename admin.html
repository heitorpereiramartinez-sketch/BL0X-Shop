<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin</title>
    <style>
        body { background:#121212; color:white; padding:40px; text-align:center; }
        .box { background:#1a1a1a; padding:20px; display:inline-block; border-radius:15px; }
        input, select, button { width: 300px; padding: 10px; margin: 5px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="box">
        <select id="jogo"><option value="gag2">Grow a Garden 2</option></select>
        <input id="nome" placeholder="Nome do Item"><input id="preco" placeholder="Preço">
        <input id="qtd" placeholder="Quantidade"><input id="foto" placeholder="Link da Foto">
        <select id="status"><option value="disponivel">Disponível</option><option value="esgotado">Esgotado</option></select>
        <button onclick="salvar()">Adicionar Produto</button>
    </div>
    <div id="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const db = getDatabase(initializeApp({ /* COPIE A MESMA CONFIG AQUI */ }));

        window.salvar = () => {
            const jogo = document.getElementById('jogo').value;
            push(ref(db, 'produtos/' + jogo), {
                nome: document.getElementById('nome').value,
                preco: document.getElementById('preco').value,
                qtd: document.getElementById('qtd').value,
                foto: document.getElementById('foto').value,
                status: document.getElementById('status').value
            });
            alert("Salvo!");
        };
    </script>
</body>
</html>
