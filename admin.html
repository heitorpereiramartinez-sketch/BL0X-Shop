<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BL0X Admin</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { padding: 12px; margin: 10px; width: 300px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; }
        button { padding: 12px 30px; background: #7289da; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #5b6eae; }
    </style>
</head>
<body>
    <h1>Adicionar Item</h1>
    <input type="text" id="nome" placeholder="Nome do Item"><br>
    <input type="text" id="preco" placeholder="Preço (ex: 50.00)"><br>
    <button onclick="salvar()">Adicionar à Loja</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.salvar = () => {
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;
            if(nome && preco) {
                push(ref(db, 'produtos/'), { nome, preco });
                alert("Produto enviado com sucesso!");
                document.getElementById('nome').value = "";
                document.getElementById('preco').value = "";
            }
        };
    </script>
</body>
</html>
