<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BLOX Admin</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 10px; display: inline-block; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; width: 250px; }
        .item { background: #222; padding: 10px; margin: 10px auto; width: 400px; display: flex; justify-content: space-between; border-radius: 5px; align-items: center; }
    </style>
</head>
<body>
    <h1>Administração</h1>
    <div class="box">
        <input id="nome" placeholder="Nome do Item"><br>
        <input id="preco" placeholder="Preço"><br>
        <input id="foto" placeholder="Link da Foto"><br>
        <button onclick="salvar()">Adicionar à Loja</button>
    </div>

    <h3>Itens Cadastrados:</h3>
    <div id="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        window.salvar = () => {
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;
            const foto = document.getElementById('foto').value;
            if(nome && preco && foto) {
                push(ref(db, 'produtos/roblox/'), { nome, preco, foto });
                alert("Item adicionado!");
            }
        };

        window.remover = (id) => { remove(ref(db, 'produtos/roblox/' + id)); };

        onValue(ref(db, 'produtos/roblox/'), (snap) => {
            const data = snap.val();
            const div = document.getElementById('lista');
            div.innerHTML = "";
            for(let id in data) {
                div.innerHTML += `<div class="item">${data[id].nome} <button onclick="remover('${id}')">Excluir</button></div>`;
            }
        });
    </script>
</body>
</html>
