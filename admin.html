<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BLOX Shop - Painel Admin</title>
</head>
<body style="background:#1a1a1a; color:white; font-family:sans-serif; text-align:center;">
    <h1>Painel de Administração</h1>
    <input type="text" id="item-nome" placeholder="Nome do Item"><br>
    <input type="number" id="item-preco" placeholder="Preço R$"><br>
    <input type="file" id="item-imagem"><br>
    <button onclick="salvarItem()">Salvar no Firebase</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f",
            measurementId: "G-ETECVVSFRH"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.salvarItem = async () => {
            const file = document.getElementById('item-imagem').files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                await addDoc(collection(db, "produtos"), {
                    nome: document.getElementById('item-nome').value,
                    preco: document.getElementById('item-preco').value,
                    imagem: e.target.result
                });
                alert("Item adicionado com sucesso!");
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
