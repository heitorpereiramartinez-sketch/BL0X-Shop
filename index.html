<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOX Center</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .nav { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 10px; 
            display: inline-block; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .nav button { 
            background: #333; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            cursor: pointer; 
            border-radius: 5px; 
            margin: 0 5px; 
            transition: 0.3s;
        }
        .nav button:hover { background: #7289da; }
        .aba { display: none; }
        .ativa { display: block; }
        
        .grid-jogos { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
        }
        .card { 
            background: #1a1a1a; 
            padding: 40px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            cursor: pointer; 
            transition: 0.3s; 
            width: 150px;
        }
        .card:hover { border-color: #7289da; transform: translateY(-5px); }
        
        input { 
            padding: 12px; 
            border-radius: 5px; 
            border: none; 
            width: 250px; 
            margin-bottom: 10px; 
        }
        .btn-entrar { 
            padding: 12px 30px; 
            background: #7289da; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="mostrar('inicio')">Início</button>
        <button onclick="mostrar('login-admin')">Admin/Dono</button>
        <button onclick="window.open('https://discord.gg/SEU_LINK_AQUI', '_blank')">Suporte Discord</button>
    </div>

    <div id="inicio" class="aba ativa">
        <h1>Bem-vindo à BLOX Shop</h1>
        <p>Escolha o jogo para ver os produtos:</p>
        <div class="grid-jogos">
            <div class="card" onclick="window.location.href='loja.html?jogo=roblox'"><h3>Roblox</h3></div>
            <div class="card" onclick="window.location.href='loja.html?jogo=minecraft'"><h3>Minecraft</h3></div>
        </div>
    </div>

    <div id="login-admin" class="aba">
        <h1>Login de Administração</h1>
        <input type="password" id="senha" placeholder="Senha secreta"><br>
        <button class="btn-entrar" onclick="logar()">Entrar</button>
    </div>

    <script>
        function mostrar(id) {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
        }

        function logar() {
            const senha = document.getElementById('senha').value;
            if(senha === "20141010") {
                window.location.href = "admin.html";
            } else {
                alert("Senha incorreta!");
            }
        }
    </script>
</body>
</html>
