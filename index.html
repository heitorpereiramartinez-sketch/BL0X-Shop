<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BL0X Shop</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .vitrine { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #444; width: 200px; transition: 0.3s; }
        .card:hover { border-color: #7289da; }
        .btn-comprar { background: #7289da; display: block; margin-top: 15px; padding: 10px; text-decoration: none; color: white; border-radius: 5px; font-weight: bold; }
        .btn-comprar:hover { background: #5b6eae; }
    </style>
</head>
<body>
    <h1>BL0X Shop</h1>
    <div id="vitrine" class="vitrine">Carregando produtos...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };

        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'produtos/roblox/'), (snap) => {
            const data = snap.val();
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = "";
            if(!data) {
                vitrine.innerHTML = "<p>Nenhum produto cadastrado no momento.</p>";
            } else {
                for(let id in data) {
                    vitrine.innerHTML += `
                        <div class="card">
                            <h3>${data[id].nome}</h3>
                            <p>R$ ${data[id].preco}</p>
                            <a href="https://discord.gg/SEU_LINK" class="btn-comprar">Comprar no Discord</a>
                        </div>`;
                }
            }
        });
    </script>
</body>
</html>
