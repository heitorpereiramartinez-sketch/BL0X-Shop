<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BLOX Shop - Vitrine</title>
</head>
<body style="background:#121212; color:white; font-family:sans-serif; text-align:center;">
    <h1>Produtos BLOX Shop</h1>
    <div id="vitrine" style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = const firebaseConfig = {

  apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",

  authDomain: "bl0x-shop.firebaseapp.com",

  projectId: "bl0x-shop",

  storageBucket: "bl0x-shop.firebasestorage.app",

  messagingSenderId: "295840974718",

  appId: "1:295840974718:web:36af692d4d19bc4134552f",

  measurementId: "G-ETECVVSFRH"

}:

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregar() {
            const querySnapshot = await getDocs(collection(db, "produtos"));
            const div = document.getElementById('vitrine');
            querySnapshot.forEach((doc) => {
                const item = doc.data();
                div.innerHTML += `
                    <div style="background:#2a2a2a; padding:15px; border-radius:10px;">
                        <img src="${item.imagem}" width="150"><br>
                        <h3>${item.nome}</h3>
                        <p>R$ ${item.preco}</p>
                        <button>Comprar</button>
                    </div>`;
            });
        }
        carregar();
    </script>
</body>
</html>
