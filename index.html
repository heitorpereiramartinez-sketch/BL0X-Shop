<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BL0X Shop</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 40px; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; max-width: 1000px; margin: 30px auto; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: #7289da; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .preco { color: #00d26a; font-weight: bold; font-size: 1.2em; margin: 15px 0; }
        .btn-discord { background: #7289da; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; }
        .btn-discord:hover { background: #5b6eae; }
    </style>
</head>
<body>
    <h1>BL0X Shop</h1>
    <div id="vitrine" class="vitrine">Carregando itens...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const LINK_DISCORD = "https://discord.gg/e3BFTcgw5U";

        onValue(ref(db, 'produtos/'), (snapshot) => {
            const data = snapshot.val();
            const div = document.getElementById('vitrine');
            div.innerHTML = "";
            if (data) {
                for (let id in data) {
                    div.innerHTML += `
                        <div class="card">
                            <h3>${data[id].nome}</h3>
                            <p class="preco">R$ ${data[id].preco}</p>
                            <a href="${LINK_DISCORD}" target="_blank" class="btn-discord">Comprar no Discord</a>
                        </div>`;
                }
            } else {
                div.innerHTML = "<p>Nenhum produto no momento.</p>";
            }
        });
    </script>
</body>
</html>
