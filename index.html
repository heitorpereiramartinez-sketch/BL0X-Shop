<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BL0X Shop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; margin: 0; text-align: center; }
        .header { background: #1f1f1f; padding: 20px; border-bottom: 3px solid #00d26a; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 40px; max-width: 1000px; margin: auto; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #00d26a; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        button { background: #00d26a; color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #00ff80; }
    </style>
</head>
<body>
    <div class="header">
        <h1>BL0X Shop</h1>
    </div>
    
    <div class="vitrine" id="vitrine-container">
        </div>

    <script>
        function carregarProdutos() {
            const itens = JSON.parse(localStorage.getItem('itensLoja') || '[]');
            const container = document.getElementById('vitrine-container');
            
            if(itens.length === 0) {
                container.innerHTML = "<p>Nenhum item disponível no momento. Volte em breve!</p>";
                return;
            }

            container.innerHTML = itens.map(item => `
                <div class="card">
                    <img src="${item.imagem}" alt="${item.nome}">
                    <h3>${item.nome}</h3>
                    <p>Preço: R$ ${item.preco}</p>
                    <button onclick="comprar('${item.nome}')">Comprar</button>
                </div>
            `).join('');
        }

        function comprar(nome) {
            alert("Você está sendo redirecionado para o nosso Discord para finalizar o pedido de " + nome);
            window.location.href = "https://discord.gg/e3BFTcgw5U";
        }

        carregarProdutos();
    </script>
</body>
</html>
