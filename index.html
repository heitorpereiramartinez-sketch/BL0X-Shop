<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BL0X Shop</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 40px; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; max-width: 900px; margin: 40px auto; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); border-color: #7289da; box-shadow: 0 10px 20px rgba(114, 137, 218, 0.2); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .btn { background: #7289da; padding: 12px; color: white; text-decoration: none; display: block; border-radius: 8px; margin-top: 10px; font-weight: bold; }
        .btn:hover { background: #5b6eae; }
    </style>
</head>
<body>
    <h1>BL0X Shop</h1>
    <div id="vitrine" class="vitrine">Carregando itens...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'produtos/roblox/'), (snap) => {
            const data = snap.val();
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = "";
            if (!data) vitrine.innerHTML = "<p>Nenhum item encontrado.</p>";
            for (let id in data) {
                vitrine.innerHTML += `
                    <div class="card">
                        <img src="${data[id].foto}" alt="Item">
                        <h3>${data[id].nome}</h3>
                        <p>R$ ${data[id].preco}</p>
                        <a href="https://discord.gg/SEU_LINK" class="btn">Comprar</a>
                    </div>`;
            }
        });
    </script>
</body>
</html>
