<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BLOX Shop</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .nav { background: #1a1a1a; padding: 15px; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #7289da; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #444; display: inline-block; margin: 10px; width: 200px; }
        .btn-comprar { background: #7289da; display: block; margin-top: 10px; padding: 8px; text-decoration: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="nav">
        <button onclick="carregar('gag2')">Grow a Garden 2</button>
        <button onclick="window.open('https://discord.gg/e3BFTcgw5U', '_blank')">Suporte</button>
    </div>

    <div id="vitrine"><h2>Escolha um jogo acima</h2></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };

        const db = getDatabase(initializeApp(firebaseConfig));

        window.carregar = (jogo) => {
            const vitrine = document.getElementById('vitrine');
            vitrine.innerHTML = "<h2>Carregando " + jogo + "...</h2>";
            
            onValue(ref(db, 'produtos/' + jogo + '/'), (snap) => {
                const data = snap.val();
                vitrine.innerHTML = "";
                if(!data) vitrine.innerHTML = "<p>Nenhum item aqui.</p>";
                for(let id in data) {
                    vitrine.innerHTML += `
                        <div class="card">
                            <h3>${data[id].nome}</h3>
                            <p>R$ ${data[id].preco}</p>
                            <a href="https://discord.gg/SEU_LINK" class="btn-comprar">Comprar no Discord</a>
                        </div>`;
                }
            });
        };
    </script>
</body>
</html>
