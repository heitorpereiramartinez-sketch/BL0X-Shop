<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BL0X Shop</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .vitrine { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 10px; width: 200px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>BL0X Shop</h1>
    <div id="vitrine" class="vitrine">Carregando produtos...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxFR4sBBzGCKzJMNdfOMF4BIzq3rttcys",
            authDomain: "bl0x-shop.firebaseapp.com",
            databaseURL: "https://bl0x-shop-default-rtdb.firebaseio.com",
            projectId: "bl0x-shop",
            storageBucket: "bl0x-shop.firebasestorage.app",
            messagingSenderId: "295840974718",
            appId: "1:295840974718:web:36af692d4d19bc4134552f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'produtos/'), (snapshot) => {
            const data = snapshot.val();
            const div = document.getElementById('vitrine');

            div.innerHTML = ""; 
            if (data) {
                for (let id in data) {
                    div.innerHTML += `
                        <div class="card">
                            <h3>${data[id].nome}</h3>
                            <p>Preço: R$ ${data[id].preco}</p>
                        </div>`;
                }
            } else {
                div.innerHTML = "<p>O banco de dados está vazio ou inacessível.</p>";
            }
        });
    </script>
</body>
</html>
