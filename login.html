<body style="background:#0f0f0f; color:white; text-align:center; padding:50px;">
    <h2>BL0X Cadastro</h2>
    <input id="userRoblox" placeholder="Nome Roblox"><br><br>
    <button onclick="logar()" style="padding:10px 30px; cursor:pointer;">Entrar</button>

    <script>
        window.logar = () => {
            const u = document.getElementById('userRoblox').value;
            localStorage.setItem('usuario', u);
            window.location.href = "index.html";
        };
    </script>
</body>
