<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BL0X Cadastro</title>
    <style>
        body { background: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .box { background: #1a1a1a; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #4a90e2; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="box">
        <h2>BL0X Cadastro</h2>
        <input id="email" type="email" placeholder="Seu E-mail">
        <input id="discord" placeholder="Usuário do Discord">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
    </div>

    <script>
        window.logar = () => {
            const user = {
                email: document.getElementById('email').value,
                discord: document.getElementById('discord').value,
                senha: document.getElementById('senha').value
            };
            
            if(user.email && user.discord && user.senha) {
                localStorage.setItem('usuario', JSON.stringify(user));
                alert("Bem-vindo, " + user.discord + "!");
                window.location.href = "index.html";
            } else {
                alert("Preencha todos os campos!");
            }
        };
    </script>
</body>
</html>
